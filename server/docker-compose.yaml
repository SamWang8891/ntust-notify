version: "3.8"
name: ntust-notify

services:
  backend:
    container_name: ntust-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
       - ./service-account.json:/usr/src/app/service-account.json
    ports:
      - "0.0.0.0:3000:3000"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"